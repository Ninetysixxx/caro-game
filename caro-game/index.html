<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#1e1e2e" />
  <title>Cờ Caro VN</title>
  <meta property="og:title" content="Cờ Caro VN" />
  <meta property="og:description" content="Cờ caro Việt Nam — daily puzzle, vs AI, chơi 2 người" />
  <meta property="og:image" content="https://caro.app/og-image.png" />
  <meta property="og:url" content="https://caro.app/" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Cờ Caro VN" />
  <meta name="twitter:description" content="Cờ caro Việt Nam — daily puzzle, vs AI, chơi 2 người" />
  <meta name="twitter:image" content="https://caro.app/og-image.png" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Caro" />
  <script src="js/sw-register.js" defer></script>
</head>
<body>
  <header class="app-header">
    <h1 class="app-title">Cờ Caro</h1>
    <button type="button" class="share-btn" id="btn-share-header" aria-label="Chia sẻ game này">🔗</button>
    <button type="button" class="share-btn" id="btn-stats-header" aria-label="Thống kê">📊</button>
    <div class="streak-display" id="streak-chip" aria-label="Streak hiện tại">
      <span class="streak-icon">🔥</span>
      <span class="streak-value">0</span>
    </div>
    <div class="mode-toggle" role="group" aria-label="Chế độ chơi">
      <button type="button" class="mode-btn is-active" data-mode="hotseat" aria-pressed="true">2 người</button>
      <button type="button" class="mode-btn" data-mode="ai" aria-pressed="false">Vs Máy</button>
      <button type="button" class="mode-btn" data-mode="daily" aria-pressed="false">Hôm nay</button>
    </div>
    <div class="difficulty-selector is-hidden" id="difficulty-selector" role="group" aria-label="Độ khó AI">
      <button type="button" class="difficulty-btn" data-level="easy" aria-pressed="false">Dễ</button>
      <button type="button" class="difficulty-btn is-active" data-level="medium" aria-pressed="true">Vừa</button>
      <button type="button" class="difficulty-btn" data-level="hard" aria-pressed="false">Khó</button>
    </div>
    <div class="score-panel" aria-live="polite" aria-label="Điểm số">
      <span class="score score-x"><span class="score-label">X</span><span class="score-value" id="score-x">0</span></span>
      <span class="score score-o"><span class="score-label">O</span><span class="score-value" id="score-o">0</span></span>
      <span class="score score-draws"><span class="score-label">Hòa</span><span class="score-value" id="score-draws">0</span></span>
    </div>
  </header>

  <main class="app-main">
    <div class="status-bar" id="status-bar" role="status" aria-live="polite">Lượt: X</div>
    <div class="board-wrapper">
      <div class="board-grid" id="board" role="grid" aria-label="Bàn cờ caro 20x20"></div>
    </div>
  </main>

  <footer class="app-footer">
    <button type="button" class="ctrl-btn" id="btn-undo" aria-label="Hoàn tác nước đi cuối">Undo</button>
    <button type="button" class="ctrl-btn" id="btn-restart" aria-label="Chơi lại từ đầu">Restart</button>
  </footer>

  <script type="module" src="js/main.js"></script>
</body>
</html>
